<div class="container-xxxl p-4">
    <div class="row">

        <!-- filters -->
        <section class="col-sm-12 col-md-12 col-lg-3 col-xl-3 col-xxl-3 mb-4">
            <h5>Sort</h5>
            <select name="" id="" class="custom-select">
                <option value="">Select...</option>
                <option value="">Alphabetical</option>
                <option value="">Price: Low to High</option>
                <option value="">Price: High to Low</option>
            </select>

            <!-- brands -->
            <h5 class="mt-4">Brands</h5>
            <ul class="list-group shadow-sm">
                <li class="list-group-item active" aria-current="true">An active item</li>
                <li class="list-group-item">A second item</li>
                <li class="list-group-item">A third item</li>
                <li class="list-group-item">A fourth item</li>
                <li class="list-group-item">And a fifth one</li>
            </ul>

            <!-- types -->
            <h5 class="mt-4">Types</h5>
            <ul class="list-group shadow-sm">
                <li class="list-group-item active" aria-current="true">An active item</li>
                <li class="list-group-item">A second item</li>
                <li class="list-group-item">A third item</li>
                <li class="list-group-item">A fourth item</li>
                <li class="list-group-item">And a fifth one</li>
            </ul>
        </section>

        <!-- main content -->
        <section class="col-sm-12 col-md-12 col-lg-9 col-xl-9 col-xxl-9 col">

            <!-- search -->
            <div class="d-flex justify-content-between align-items-center mb-2">
                <small>Showing <strong>10</strong> of <strong>16</strong></small>
                <div class="row align-items-center">
                    <div class="col-auto p-0">
                        <input type="text" id="inputPassword6" class="form-control" aria-describedby="passwordHelpInline">
                    </div>
                    <div class="col-auto -0">
                        <button type="button" class="btn btn-outline-secondary">
                            <i class="bi bi-search"></i>
                        </button>
                        <button type="button" class="btn btn-outline-secondary ms-1">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                </div>
            </div>


            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3">
                @for (p of products; track $index) 
                {
                    <div class="col">
                        <app-product-item [product]="p"></app-product-item>
                    </div>
                }
            </div>
        </section>
    </div>
</div>
