<div class="card shadow-sm h-100">
    <img src="{{product?.pictureUrl}}" alt="{{product?.name}}">
    <div class="card-body">
        <h6>{{product?.name}}</h6>
        <span class="card-text">{{product?.price | currency}}</span>
        <div class="d-flex justify-content-between align-items-center">
            <div class="btn-group mt-1 w-100">
                <button type="button" class="btn btn-sm btn-outline-secondary"><i class="bi bi-cart"></i> Add</button>
                <button type="button" class="btn btn-sm btn-outline-secondary"><i class="bi bi-eye"></i> View</button>
            </div>
        </div>
    </div>
</div>
